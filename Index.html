<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Scientific Calculator</title>

<style>
body {
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    background: #0f172a;
    font-family: Arial;
}

.calculator {
    background: #1e293b;
    padding: 20px;
    border-radius: 15px;
}

.display {
    width: 100%;
    height: 60px;
    font-size: 26px;
    text-align: right;
    margin-bottom: 15px;
    padding: 10px;
    border-radius: 10px;
    border: none;
    
    /*FIX: better visibility */
    background: #000;
    color: #00ffcc;
    font-weight: bold;
}

.buttons {
    display: grid;
    grid-template-columns: repeat(5, 70px);
    gap: 10px;
}

button {
    height: 60px;
    font-size: 16px;
    border: none;
    border-radius: 10px;
    cursor: pointer;
}

button:hover {
    transform: scale(1.05);
}

.operator { background: orange; color: white; }
.equal { background: green; color: white; }
.clear { background: red; color: white; }
.func { background: #3b82f6; color: white; }
</style>
</head>

<body>

<div class="calculator">
    <input type="text" id="display" class="display" disabled>

    <div class="buttons">
        <button onclick="clearDisplay()" class="clear">C</button>
        <button onclick="backspace()">⌫</button>
        <button onclick="appendValue('(')">(</button>
        <button onclick="appendValue(')')">)</button>
        <button onclick="appendValue('/')">/</button>

        <button onclick="mathFunc('sin')" class="func">sin</button>
        <button onclick="mathFunc('cos')" class="func">cos</button>
        <button onclick="mathFunc('tan')" class="func">tan</button>
        <button onclick="mathFunc('log')" class="func">log</button>
        <button onclick="appendValue('*')">*</button>

        <button onclick="appendValue('7')">7</button>
        <button onclick="appendValue('8')">8</button>
        <button onclick="appendValue('9')">9</button>
        <button onclick="mathFunc('sqrt')" class="func">√</button>
        <button onclick="appendValue('-')" class="operator">-</button>

        <button onclick="appendValue('4')">4</button>
        <button onclick="appendValue('5')">5</button>
        <button onclick="appendValue('6')">6</button>
        <button onclick="mathFunc('square')" class="func">x²</button>
        <button onclick="appendValue('+')" class="operator">+</button>

        <button onclick="appendValue('1')">1</button>
        <button onclick="appendValue('2')">2</button>
        <button onclick="appendValue('3')">3</button>
        <button onclick="appendValue('0')">0</button>
        <button onclick="calculate()" class="equal">=</button>

        <button onclick="appendValue('.')">.</button>
        <button onclick="appendValue(Math.PI)" class="func">π</button>
    </div>
</div>

<script>
function appendValue(value) {
    document.getElementById("display").value += value;
}

function clearDisplay() {
    document.getElementById("display").value = "";
}

function backspace() {
    let val = document.getElementById("display").value;
    document.getElementById("display").value = val.slice(0, -1);
}

function calculate() {
    try {
        let result = eval(document.getElementById("display").value);
        document.getElementById("display").value = result;
    } catch {
        alert("Invalid Input");
    }
}

// Scientific Functions
function mathFunc(func) {
    let value = document.getElementById("display").value;

    try {
        let num = eval(value);

        if (func === "sin") num = Math.sin(num);
        if (func === "cos") num = Math.cos(num);
        if (func === "tan") num = Math.tan(num);
        if (func === "log") num = Math.log10(num);
        if (func === "sqrt") num = Math.sqrt(num);
        if (func === "square") num = num * num;

        document.getElementById("display").value = num;
    } catch {
        alert("Invalid Input");
    }
}

<!-- Keyboard Support -->
document.addEventListener("keydown", function(event) {
    const key = event.key;

    if (!isNaN(key) || ['+', '-', '*', '/', '.', '(', ')'].includes(key)) {
        appendValue(key);
    } else if (key === "Enter") {
        calculate();
    } else if (key === "Backspace") {
        backspace();
    } else if (key === "Escape") {
        clearDisplay();
    }
});
</script>

</body>
</html>
